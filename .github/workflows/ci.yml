name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout protea-contracts (path-dep)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/protea-contracts
          path: protea-contracts
          ref: main
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --with dev
      - name: Lint (ruff)
        run: poetry run ruff check .
      - name: Type-check (mypy strict)
        run: poetry run mypy src tests
      - name: Test
        run: poetry run pytest --cov=protea_runners --cov-report=term --cov-fail-under=70
